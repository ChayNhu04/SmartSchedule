name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shared:
    name: Shared types typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @smartschedule/shared typecheck

  backend:
    name: Backend lint + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter smartschedule-backend lint --if-present
      - run: pnpm --filter smartschedule-backend build
      - run: pnpm --filter smartschedule-backend test --if-present

  web:
    name: Web typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter smartschedule-web typecheck
      - run: pnpm --filter smartschedule-web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api

  mobile:
    name: Mobile typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter smartschedule-mobile typecheck
